name: Build and Publish Codex Image
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/build-and-publish-codex-image.yml
      - containers/codex/Dockerfile
      - containers/codex/config.toml
permissions:
  contents: read
  packages: write
env:
  IMAGE_NAME: ghcr.io/betarixm/catchy-codex
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: containers/codex
          file: containers/codex/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
