[project]
name = "catchy-core"
version = "0.1.0"
description = ""
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "omegaconf>=2.3.0",
    "pydantic>=2.13.4",
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "."

[tool.setuptools.packages.find]
include = ["catchy.core*"]
namespaces = true

[tool.setuptools.package-data]
"*" = ["py.typed"]
