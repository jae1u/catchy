[project]
name = "catchy-web"
version = "0.1.0"
description = ""
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "catchy-codex",
    "catchy-core",
    "django>=6.0,<6.1",
    "gunicorn>=23.0.0",
    "omegaconf>=2.3.0",
    "tzdata>=2026.2",
    "whitenoise>=6.9.0",
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "."

[tool.setuptools.packages.find]
include = ["catchy.web*"]
namespaces = true

[tool.setuptools.package-data]
"*" = ["py.typed", "templates/**/*.html"]
